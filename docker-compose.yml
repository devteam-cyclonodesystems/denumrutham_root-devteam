version: "3.9"

services:
  # ── PostgreSQL Database ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tms_postgres_local
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tms_postgres
    volumes:
      - tms_pgdata:/var/lib/postgresql/data
    ports:
      # Windows/Host avoids conflicts on 5432 by using 5433 for local host connection.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Rate limiting + Caching) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tms_redis_local
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  tms_pgdata:
